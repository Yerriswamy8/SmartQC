services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: smartqc_demo
      MYSQL_USER: smartqc
      MYSQL_PASSWORD: smartqc_demo
      MYSQL_ROOT_PASSWORD: root_demo_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: smartqc_demo
      MINIO_ROOT_PASSWORD: smartqc_demo_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  mysql_data:
  minio_data:
